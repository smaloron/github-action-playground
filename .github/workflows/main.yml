name: First Workflow
on: workflow_dispatch
env:
  APP_NAME: "My App"
jobs:
  first-job:
    runs-on: ubuntu-22.04
    env:
      BUILD_TYPE: "Release"
    steps:
      - name: hello
        env:
          USER_NAME: "World"
          APP_NAME: "My App for user"
        run: echo "Hello $USER_NAME"
      - name: goodbye
        run: echo "Goodbye"
      - name: show-app-name
        run: echo $APP_NAME

  second-job:
      runs-on: ubuntu-22.04
      env:
        BUILD_TYPE: "Debug"
      steps:
        - name: show-app-name
          run: echo $APP_NAME