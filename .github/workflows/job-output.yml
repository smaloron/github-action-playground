name: job-output.yml
on: workflow_dispatch

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      output2: ${{ steps.set-name.outputs.output2 }}
    steps:
      - name: set output2
        id: set-name
        run: echo "output2=World" >> $GITHUB_OUTPUT
      - name: test output2
        run : echo "${{ steps.set-name.outputs.output2 }}"


  use:
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - run: echo "${{ needs.generate.outputs.output2 }}"
