name: job-output.yml
on: workflow_dispatch

jobs:
  generate:
    runs-on: ubuntu-latest
    outputs:
      output1: ${{ steps.generate.outputs.output1 }}
      output2: ${{ steps.generate.outputs.output2 }}
    steps:
      - name: set output1
        run: echo "::set-output name=output1::Hello"
      - name: set output2
        run: echo "output2=World" >> $GITHUB_OUTPUT

  use:
    runs-on: ubuntu-latest
    needs: generate
    steps:
      - run: echo "${{ needs.generate.outputs.output1 }}"
      - run: echo "${{ needs.generate.outputs.output2 }}"
